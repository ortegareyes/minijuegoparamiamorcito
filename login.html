<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔐 Login Para que entres al juego mi pelona</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a2e;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }
    .login-card {
      width: min(360px, 90vw);
      padding: 28px;
      background: rgba(10,0,20,0.96);
      border: 2px solid #ff6eb4;
      box-shadow: 0 0 30px rgba(255,110,180,0.2);
      border-radius: 18px;
      text-align: center;
    }
    .login-card h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 1rem;
      color: #ff6eb4;
      text-shadow: 2px 2px 0 #8b0057;
      margin-bottom: 14px;
    }
    .login-card p {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      color: #ddd;
      margin-bottom: 22px;
      line-height: 1.6;
    }
    .login-card input {
      width: 100%;
      margin: 8px 0;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid rgba(255,110,180,0.6);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      outline: none;
      text-align: center;
    }
    .login-card input::placeholder { color: rgba(255,255,255,0.6); }
    .login-card button {
      margin-top: 14px;
      width: 100%;
      padding: 12px 0;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
      background: #ff6eb4;
      color: #1a0a2e;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 4px 4px 0 #8b0057;
    }
    .login-card button:hover {
      transform: translate(2px,2px);
      box-shadow: 2px 2px 0 #8b0057;
    }
    .login-error {
      min-height: 1.2rem;
      margin-top: 12px;
      color: #ffb3d9;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
    }
    .hint {
      margin-top: 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🔐 LOGIN</h1>
    <p>Accede al juego con las credenciales mi pelona hermosa.</p>
    <input id="login-user" type="text" placeholder="Usuario" autocomplete="username" />
    <input id="login-pass" type="password" placeholder="Contraseña" autocomplete="current-password" />
    <button id="login-btn">▶ ENTRAR</button>
    <div class="login-error" id="login-error"></div>
    <div class="hint">usuario: kristel<br>contraseña: eres el amor de mi vida</div>
  </div>
  <script>
    const userInput = document.getElementById('login-user');
    const passInput = document.getElementById('login-pass');
    const errorBox = document.getElementById('login-error');
    const button = document.getElementById('login-btn');

    function login() {
      const user = userInput.value.trim().toLowerCase();
      const pass = passInput.value;
      if (user === 'kristel' && pass === 'eres el amor de mi vida') {
        sessionStorage.setItem('loggedIn', 'true');
        window.location.href = 'juego_kristelv1.html';
      } else {
        errorBox.textContent = 'Usuario o contraseña incorrectos.';
      }
    }

    button.addEventListener('click', login);
    userInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    passInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
